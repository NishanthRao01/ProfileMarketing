<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeAce Chatbot</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1a365d;
            --secondary: #2563eb;
            --accent: #3b82f6;
            --gradient-start: #2563eb;
            --gradient-end: #3b82f6;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hover-glow:hover {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
            transform: translateY(-2px);
        }
        
        .chat-window {
            transition: all 0.3s ease-in-out;
            transform: translateY(100%);
            opacity: 0;
        }
        
        .chat-window.open {
            transform: translateY(0);
            opacity: 1;
        }
        
        .chat-icon {
            transition: all 0.3s ease-in-out;
        }
        
        .chat-icon:hover {
            transform: scale(1.1);
        }
        
        .message-bubble {
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }
            50% {
                opacity: 0.9;
                transform: scale(1.1);
            }
            80% {
                opacity: 1;
                transform: scale(0.89);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        
        .quick-reply {
            transition: all 0.2s ease;
        }
        
        .quick-reply:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--secondary);
            border-radius: 50%;
            animation: typingAnimation 1.4s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingAnimation {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
    </style>
</head>
<body>
    <!-- Chat Icon -->
    <button id="chatIcon" class="fixed bottom-8 right-8 w-16 h-16 rounded-full bg-gradient-to-r from-blue-600 to-blue-500 text-white shadow-lg hover-glow chat-icon flex items-center justify-center z-50">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
        </svg>
    </button>
    
    <!-- Chat Window -->
    <div id="chatWindow" class="fixed bottom-24 right-8 w-96 h-[600px] glass-card rounded-2xl shadow-xl flex flex-col z-50 chat-window">
        <!-- Chat Header -->
        <div class="p-4 border-b border-gray-200 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-r from-blue-600 to-blue-500 flex items-center justify-center">
                    <span class="text-white font-bold">A</span>
                </div>
                <div>
                    <h3 class="font-semibold text-gray-800">Ace</h3>
                    <p class="text-sm text-gray-500">Resume Assistant</p>
                </div>
            </div>
            <button id="closeChat" class="text-gray-500 hover:text-gray-700 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        
        <!-- Chat Messages -->
        <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4">
            <!-- Messages will be added here dynamically -->
        </div>
        
        <!-- Chat Input -->
        <div id="chatInput" class="p-4 border-t border-gray-200">
            <div class="flex items-center space-x-2">
                <input type="text" id="messageInput" class="flex-1 px-4 py-2 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition" placeholder="Type your message...">
                <button id="sendMessage" class="p-2 text-blue-600 hover:text-blue-700 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <!-- AOS Script -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <!-- Custom Scripts -->
    <script>
        // Initialize AOS
        AOS.init({
            duration: 1000,
            once: true
        });
        
        // Chat State
        let chatState = {
            isOpen: false,
            currentStep: 0,
            userData: {
                jobRole: '',
                hasResume: null,
                resumeFile: null,
                name: '',
                email: ''
            }
        };
        
        // Chat Steps
        const chatSteps = [
            {
                message: "👋 Hi! I'm Ace, your resume assistant. Ready to craft the perfect resume for your dream job?",
                type: 'bot'
            },
            {
                message: "What type of job are you applying for?",
                type: 'bot',
                input: 'text'
            },
            {
                message: "Do you already have a resume you'd like us to tailor?",
                type: 'bot',
                input: 'quick-replies',
                options: ['Yes', 'No']
            },
            {
                message: "Great! Please upload your resume (PDF or DOCX):",
                type: 'bot',
                input: 'file',
                condition: (data) => data.hasResume === 'Yes'
            },
            {
                message: "What's your name?",
                type: 'bot',
                input: 'text'
            },
            {
                message: "And your email address?",
                type: 'bot',
                input: 'text'
            },
            {
                message: "Awesome! We'll get in touch shortly. You're one step closer to landing the job 🚀",
                type: 'bot'
            }
        ];
        
        // DOM Elements
        const chatIcon = document.getElementById('chatIcon');
        const chatWindow = document.getElementById('chatWindow');
        const closeChat = document.getElementById('closeChat');
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendMessage = document.getElementById('sendMessage');
        
        // Toggle Chat
        chatIcon.addEventListener('click', () => {
            chatState.isOpen = true;
            chatWindow.classList.add('open');
            if (chatState.currentStep === 0) {
                addMessage(chatSteps[0].message, 'bot');
                setTimeout(() => nextStep(), 1000);
            }
        });
        
        closeChat.addEventListener('click', () => {
            chatState.isOpen = false;
            chatWindow.classList.remove('open');
        });
        
        // Add Message
        function addMessage(message, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message-bubble flex ${type === 'bot' ? 'justify-start' : 'justify-end'}`;
            
            const bubble = document.createElement('div');
            bubble.className = `max-w-[80%] rounded-2xl px-4 py-2 ${
                type === 'bot' 
                    ? 'bg-white border border-gray-200' 
                    : 'bg-gradient-to-r from-blue-600 to-blue-500 text-white'
            }`;
            bubble.textContent = message;
            
            messageDiv.appendChild(bubble);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // Show Typing Indicator
        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'message-bubble flex justify-start';
            indicator.innerHTML = `
                <div class="max-w-[80%] rounded-2xl px-4 py-2 bg-white border border-gray-200">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            chatMessages.appendChild(indicator);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return indicator;
        }
        
        // Next Step
        function nextStep() {
            chatState.currentStep++;
            const step = chatSteps[chatState.currentStep];
            
            if (!step) return;
            
            // Check conditions
            if (step.condition && !step.condition(chatState.userData)) {
                nextStep();
                return;
            }
            
            const typingIndicator = showTypingIndicator();
            
            setTimeout(() => {
                typingIndicator.remove();
                addMessage(step.message, 'bot');
                
                if (step.input) {
                    showInput(step);
                }
            }, 1500);
        }
        
        // Show Input
        function showInput(step) {
            const inputContainer = document.createElement('div');
            inputContainer.className = 'message-bubble flex justify-end mt-4';
            
            if (step.input === 'text') {
                inputContainer.innerHTML = `
                    <div class="max-w-[80%] w-full">
                        <input type="text" class="w-full px-4 py-2 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition" placeholder="Type your answer...">
                        <button class="mt-2 px-4 py-2 bg-gradient-to-r from-blue-600 to-blue-500 text-white rounded-lg hover:shadow-lg transition">Send</button>
                    </div>
                `;
                
                const input = inputContainer.querySelector('input');
                const button = inputContainer.querySelector('button');
                
                button.addEventListener('click', () => {
                    if (input.value.trim()) {
                        addMessage(input.value, 'user');
                        chatState.userData[step.dataKey] = input.value;
                        inputContainer.remove();
                        nextStep();
                    }
                });
                
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && input.value.trim()) {
                        addMessage(input.value, 'user');
                        chatState.userData[step.dataKey] = input.value;
                        inputContainer.remove();
                        nextStep();
                    }
                });
            } else if (step.input === 'quick-replies') {
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'max-w-[80%] flex flex-wrap gap-2';
                
                step.options.forEach(option => {
                    const button = document.createElement('button');
                    button.className = 'quick-reply px-4 py-2 bg-white border border-gray-200 rounded-lg hover:border-blue-500 transition';
                    button.textContent = option;
                    
                    button.addEventListener('click', () => {
                        addMessage(option, 'user');
                        chatState.userData[step.dataKey] = option;
                        optionsDiv.remove();
                        nextStep();
                    });
                    
                    optionsDiv.appendChild(button);
                });
                
                inputContainer.appendChild(optionsDiv);
            } else if (step.input === 'file') {
                inputContainer.innerHTML = `
                    <div class="max-w-[80%] w-full">
                        <div class="file-input-wrapper">
                            <button class="w-full px-4 py-2 bg-white border-2 border-gray-200 rounded-lg hover:border-blue-500 transition flex items-center justify-center space-x-2">
                                <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                                </svg>
                                <span>Upload Resume</span>
                            </button>
                            <input type="file" accept=".pdf,.docx" class="file-input">
                        </div>
                    </div>
                `;
                
                const fileInput = inputContainer.querySelector('input[type="file"]');
                const button = inputContainer.querySelector('button');
                
                fileInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        addMessage(file.name, 'user');
                        chatState.userData.resumeFile = file;
                        inputContainer.remove();
                        nextStep();
                    }
                });
            }
            
            chatMessages.appendChild(inputContainer);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // Send Message
        sendMessage.addEventListener('click', () => {
            const message = messageInput.value.trim();
            if (message) {
                addMessage(message, 'user');
                messageInput.value = '';
                
                // Log data to console
                console.log('Chat State:', chatState);
            }
        });
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const message = messageInput.value.trim();
                if (message) {
                    addMessage(message, 'user');
                    messageInput.value = '';
                    
                    // Log data to console
                    console.log('Chat State:', chatState);
                }
            }
        });
    </script>
</body>
</html>
